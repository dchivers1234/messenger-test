<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messenger Test Site - Products page</title>

  <script type="text/javascript" charset="utf-8">
    (function () {
      const params = new URLSearchParams(window.location.search);
      const entryPoint = params.get('entryPoint') || 'EE_MAIN';

      window.GenesysConfig = {
        environment: 'prod-euw2',
        deploymentId: 'a6c7a023-1e5a-4c5d-b329-fb43ac489980'
      };

      window._genesysJs = 'Genesys';

      ;(function (g, e, n, es, ys) {
        g[e] = g[e] || function () {
          (g[e].q = g[e].q || []).push(arguments);
        };
        g[e].t = 1 * new Date();
        g[e].c = es;

        g[e].setData = function () {
          g[e]('command', 'Database.set', {
            messaging: {
              customAttributes: {
                cleanURL: window.location.origin + window.location.pathname,
                fullURL: window.location.href,
                entryPoint: entryPoint
              }
            }
          });
          console.log('SETDATA', entryPoint);
        };

        g[e].logData = function () {
          g[e]('command', 'Database.get', function (d) {
            console.log(JSON.stringify(d?.messaging?.customAttributes || {}, null, 2));
          });
        };

        let done = false;
        g[e]('subscribe', 'Messenger.ready', () => {
          if (done) return;
          done = true;
          g[e]('subscribe', 'MessagingService.started', g[e].setData);
          g[e]('subscribe', 'Messenger.opened', g[e].setData);
        });

        ys = document.createElement('script');
        ys.async = 1;
        ys.src = n;
        ys.charset = 'utf-8';
        document.head.appendChild(ys);
      })(window, 'Genesys', 'https://apps.euw2.pure.cloud/genesys-bootstrap/genesys.min.js', {
        environment: 'prod-euw2',
        deploymentId: 'xxxxxxx'
      });
    })();
  </script>
</head>
<body>
  <h1>🌐 Messenger Test Site - Products page</h1>
  <p>This site is hosted on GitHub Pages for testing.</p>

  <form id="entryPointForm" style="margin: 16px 0;">
    <label for="entryPointInput"><strong>Entry Point:</strong></label>
    <input
      id="entryPointInput"
      name="entryPoint"
      type="text"
      value="EE_MAIN"
      style="margin-left: 8px; padding: 6px 8px; width: 220px;"
    />
    <button type="submit" style="margin-left: 8px; padding: 6px 12px;">
      Apply & Reload
    </button>
  </form>

  <nav>
    <a href="index.html">Home</a> |
    <a href="products.html">Products</a> |
    <a href="contact.html">Contact</a>
  </nav>

  <h2>Test Journey Tracking</h2>
  <p>Click the links above to navigate between pages and test Predictive Engagement tracking.</p>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const entryPoint = params.get('entryPoint') || 'EE_MAIN';
      const input = document.getElementById('entryPointInput');
      const form = document.getElementById('entryPointForm');

      input.value = entryPoint;

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const value = input.value.trim() || 'EE_MAIN';

        const nextUrl = new URL(window.location.href);
        nextUrl.searchParams.set('entryPoint', value);

        window.location.href = nextUrl.toString();
      });
    })();
  </script>
</body>
</html>
