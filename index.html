<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Messenger Test Site - Home Page</title>
    
    <!-- Messenger snippet -->
    <script type="text/javascript" charset="utf-8">
        (function (g, e, n, es, ys) {
            g['_genesysJs'] = e;
            g[e] = g[e] <span class="ea-spoiler"> function () {
                (g[e].q = g[e].q </span> []).push(arguments)
            };
            g[e].t = 1 * new Date();
            g[e].c = es;
            ys = document.createElement('script'); 
            ys.async = 1; 
            ys.src = n; 
            ys.charset = 'utf-8'; 
            document.head.appendChild(ys);
        })(window, 'Genesys', 'https://apps.euw2.pure.cloud/genesys-bootstrap/genesys.min.js', {

    <style>
        #chat-btn {
            background-color: #0078D4;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
        }
        #chat-btn:hover {
            background-color: #005A9E;
        }
        #chat-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>🌐 Messenger Test Site - Home Page</h1>
    <p>This site is hosted on GitHub Pages for testing.</p>
    
    <nav>
        <a href="index.html">Home</a> |
        <a href="products.html">Products</a> |
        <a href="contact.html">Contact</a>
    </nav>
    
    <h2>Test Journey Tracking</h2>
    <p>Click the links above to navigate between pages and test Predictive Engagement tracking.</p>
    
    <!-- Chat Button -->
    <div style="margin-top: 30px;">
        <button id="chat-btn" disabled>💬 Loading Chat...</button>
    </div>
    
    <script>
        var chatButton = document.getElementById('chat-btn');
        var messengerReady = false;
        
        var checkInterval = setInterval(function() {
            if (typeof window.Genesys !== 'undefined') {
                clearInterval(checkInterval);
                console.log('Genesys loaded');
                
                window.Genesys('subscribe', 'Messenger.ready', function() {
                    messengerReady = true;
                    console.log('Messenger is ready');
                    chatButton.disabled = false;
                    chatButton.innerText = '💬 Chat with Us';
                });
            }
        }, 100);
        
        chatButton.onclick = function() {
            if (!messengerReady) {
                alert('Chat is still loading, please wait...');
                return;
            }
            
            window.Genesys('command', 'Messenger.open', null,
                function() {
                    console.log('Messenger opened successfully');
                },
                function(error) {
                    console.error('Error:', error);
                }
            );
        };
    </script>
</body>
</html>
