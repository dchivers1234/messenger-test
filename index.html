<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Messenger Test Site - Products page</title>

  <script type="text/javascript" charset="utf-8">
    (function () {
      const params = new URLSearchParams(window.location.search);

      const entryPoint = params.get('entryPoint') || '';
      const deploymentId = params.get('deploymentId') || 'xxxxxxx';

      (function (g, e, n, es, ys) {
        g['_genesysJs'] = e;
        g[e] = g[e] || function () {
          (g[e].q = g[e].q || []).push(arguments);
        };
        g[e].t = 1 * new Date();
        g[e].c = es;

        g[e].setData = function () {
          const customAttributes = {
            cleanURL: window.location.origin + window.location.pathname,
            fullURL: window.location.href
          };

          if (entryPoint) {
            customAttributes.entryPoint = entryPoint;
          }

          g[e]('command', 'Database.set', {
            messaging: {
              customAttributes
            }
          });

          console.log('SETDATA', entryPoint);
        };

        let done = false;
        g[e]('subscribe', 'Messenger.ready', function () {
          if (done) return;
          done = true;

          g[e]('subscribe', 'MessagingService.started', g[e].setData);
          g[e]('subscribe', 'Messenger.opened', g[e].setData);

          g[e].setData();
          g[e]('command', 'Messenger.open');
        });

        ys = document.createElement('script');
        ys.async = 1;
        ys.src = n;
        ys.charset = 'utf-8';
        document.head.appendChild(ys);

      })(window, 'Genesys', 'https://apps.euw2.pure.cloud/genesys-bootstrap/genesys.min.js', {
        environment: 'prod-euw2',
        deploymentId: deploymentId
      });
    })();
  </script>
</head>

<body>
  <h1>🌐 Messenger Test Site - Products page</h1>

  <form id="configForm" style="margin: 16px 0;">
    <div style="margin-bottom: 8px;">
      <label><strong>Entry Point:</strong></label>
      <input
        id="entryPointInput"
        type="text"
        style="margin-left: 8px; padding: 6px; width: 220px;"
      />
    </div>

    <div style="margin-bottom: 8px;">
      <label><strong>Deployment ID:</strong></label>
      <input
        id="deploymentIdInput"
        type="text"
        style="margin-left: 8px; padding: 6px; width: 320px;"
      />
    </div>

    <button type="submit" style="padding: 6px 12px;">
      Apply & Reload
    </button>
  </form>

  <nav>
    <a href="index.html">Home</a> |
    <a href="products.html">Products</a> |
    <a href="contact.html">Contact</a>
  </nav>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);

      const entryPoint = params.get('entryPoint') || '';
      const deploymentId = params.get('deploymentId') || 'xxxxxxx';

      const entryInput = document.getElementById('entryPointInput');
      const deploymentInput = document.getElementById('deploymentIdInput');
      const form = document.getElementById('configForm');

      entryInput.value = entryPoint;
      deploymentInput.value = deploymentId;

      form.addEventListener('submit', function (e) {
        e.preventDefault();

        const newEntry = entryInput.value.trim();
        const newDeployment = deploymentInput.value.trim() || 'xxxxxxx';

        const nextUrl = new URL(window.location.href);

        if (newEntry) {
          nextUrl.searchParams.set('entryPoint', newEntry);
        } else {
          nextUrl.searchParams.delete('entryPoint');
        }

        nextUrl.searchParams.set('deploymentId', newDeployment);

        window.location.href = nextUrl.toString();
      });
    })();
  </script>
</body>
</html>
